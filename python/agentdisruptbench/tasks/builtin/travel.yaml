      disruption_sensitive_tools: [check_hotel_availability]
      recovery_actions: [retry_availability]

  - task_id: travel_013
    title: "Complete flight + hotel booking"
    description: |
      Plan a trip from SFO to London. Search flights for 2026-09-01, book the
