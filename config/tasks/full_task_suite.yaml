    description: "Customer CUST-014 wants to return PRD-heavy. Returns are free if initiated today. Tomorrow starts a 15% restocking fee. However, the return pickup service is overloaded. Should the customer wait for a guaranteed slot tomorrow or drop it off at a warehouse today? Return shipping is $30."
