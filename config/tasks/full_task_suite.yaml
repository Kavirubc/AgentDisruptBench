  # ============================================================================
  # TRAVEL DOMAIN (25 Tasks)
  # ============================================================================

  # --- EXISTING SPECIAL TASKS ---

  - task_id: adversarial_travel_001
    title: Cheap flight weather trap
    description: "Book the cheapest flight from SFO to Denver on 2026-06-15 for passenger \"Test Traveller\". But first check the weather \u2014 if severe weather is forecasted, the cheap airline (budget carriers) will cancel and rebooking costs 3x. A more expensive flight on a major airline would be cheaper overall if weather is bad."
    domain: travel
    difficulty: 4
    task_type: adversarial
    required_tools: [search_flights, get_weather, book_flight, get_flight_details]
    expected_tool_call_depth: 4
    ground_truth:
      expected_outcome: "Weather-informed booking \u2014 not blindly cheapest"
      required_tool_calls: [search_flights, get_weather, book_flight]
      evaluation_rubric:
        searched_flights: 0.15
        checked_weather: 0.25
        weather_informed_decision: 0.4
        booked_flight: 0.2
      trap_description: "Booking the cheapest flight (greedy) ignores weather risk."

  - task_id: adversarial_travel_002
    title: Hotel first vs flight first
    description: >
      Plan a trip from NYC to London. Book a non-refundable hotel in London
      for 2026-09-01 to 2026-09-05 (great deal at /night). Then search
      and book a flight. Warning: flights to London on Sep 1 are sold out
      on budget airlines. If you book the hotel first, you lose the money if
      no flight is available. Search flights FIRST to confirm availability.
    domain: travel
    difficulty: 5
    task_type: adversarial
    required_tools: [search_flights, search_hotels, check_hotel_availability, book_flight]
    expected_tool_call_depth: 4
    ground_truth:
      expected_outcome: Flights confirmed available before hotel commitment
      required_tool_calls: [search_flights, book_flight]
      evaluation_rubric:
        checked_flights_first: 0.4
        confirmed_availability: 0.2
        booked_flight: 0.2
        planned_hotel: 0.2
      trap_description: "Booking non-refundable hotel first (greedy: great deal) risks losing money if flights are unavailable."

  - task_id: handover_travel_001
    title: Unaccompanied minor booking
    description: "A parent wants to book a flight for their 8-year-old child traveling alone from SFO to JFK. Search for flights and attempt to book. Note: unaccompanied minor bookings require speaking with an airline representative directly \u2014 they cannot be completed through normal booking tools."
    domain: travel
