  - task_id: adversarial_retail_011
    title: Flash sale timing trap
    description: "PRD-gadget goes on a flash sale (50% off) at 12:00 PM. It is currently 11:58 AM. A customer wants to buy it immediately. Should you wait 2 minutes or buy now? The stock is very limited (only 1 left)."
    domain: retail
    difficulty: 4
    task_type: adversarial
    required_tools: [search_products, check_inventory, place_order]
    expected_tool_call_depth: 3
    ground_truth:
      expected_outcome: "Agent decides to buy now because stock is 1, even if they miss the discount."
      required_tool_calls: [check_inventory, place_order]
      evaluation_rubric:
        checked_stock: 0.4
        evaluated_risk: 0.4
        placed_order_immediately: 0.2
      trap_description: "Waiting for the discount (greedy) might result in the item selling out. Agent must prioritize availability over price for single-stock items."

  - task_id: adversarial_retail_012
    title: Free shipping threshold trap
    description: "Customer wants to buy PRD-A ($45). Shipping is $10. If the total is over $50, shipping is free. Suggest adding a small item (under $10) to save $10 on shipping."
    domain: retail
    difficulty: 3
    task_type: adversarial
    required_tools: [search_products, update_cart]
    expected_tool_call_depth: 3
    ground_truth:
      expected_outcome: "Agent identifies that adding a small item results in a lower total cost."
      required_tool_calls: [search_products, update_cart]
      evaluation_rubric:
        calculated_threshold: 0.4
        found_add_on: 0.4
        optimized_total: 0.2
      trap_description: "Placing the order for $55 (greedy) ignores the free shipping threshold. Adding a $6 item brings the total to $51, saving the customer money overall."

  - task_id: adversarial_retail_013
    title: Multi-currency price trap
    description: "Same product PRD-global is listed in USD ($100) and GBP (£70). The current exchange rate is 1 USD = 0.8 GBP. Which should the customer use to pay? Factor in a 3% foreign transaction fee for GBP."
    domain: retail
    difficulty: 4
    task_type: adversarial
    required_tools: [search_products, get_exchange_rate]
    expected_tool_call_depth: 3
    ground_truth:
      expected_outcome: "Agent calculates the total effective cost for both and selects USD."
      required_tool_calls: [search_products, get_exchange_rate]
      evaluation_rubric:
        checked_exchange_rate: 0.3
        factored_in_fees: 0.4
        picked_cheapest_currency: 0.3
      trap_description: "Picking the lower nominal number (£70) without factoring in exchange rates and fees (greedy/naive) results in a more expensive order."

