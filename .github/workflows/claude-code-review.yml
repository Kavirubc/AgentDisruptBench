name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Please review this pull request. Focus on:
            - Correctness and logic bugs
            - Python best practices and code quality
            - Missing error handling at system boundaries
            - Any issues with the benchmark evaluation logic, state management, or tool orchestration
            - Import errors or missing dependencies

            Be concise. Only comment on meaningful issues, not style nitpicks.
